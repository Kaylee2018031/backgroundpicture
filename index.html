<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <p class="eyebrow">Creative Tools</p>
        <h1>Simple AI Image Generator</h1>
        <p class="subtitle">Type a prompt and generate unique AI images instantly.</p>

        <form id="prompt-form" class="prompt-form" autocomplete="off">
          <label for="prompt">Image Prompt</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="4"
            placeholder="Example: futuristic city skyline at sunset, cinematic lighting, ultra detailed"
            required
          ></textarea>
          <button id="generate-btn" type="submit">Generate Image</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="gallery-section">
        <div class="gallery-header">
          <h2>Image Gallery</h2>
          <p>Your latest generated images appear here.</p>
        </div>
        <div id="gallery" class="gallery"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
