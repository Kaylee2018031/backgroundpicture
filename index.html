<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warm Bookstore Background Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <header class="panel__header">
          <p class="eyebrow">Realistic Photo Style</p>
          <h1>따뜻한 서점 배경 이미지 생성기</h1>
          <p class="subtitle">
            아늑한 서점과 카페 분위기를 사실적인 사진 스타일로 생성해 보세요.
          </p>
        </header>

        <form id="prompt-form" class="prompt-form" autocomplete="off">
          <label for="prompt" class="prompt-form__label">Prompt</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="4"
            placeholder="예: warm cinematic bookstore café interior, wooden shelves, afternoon sun rays, shallow depth of field, realistic photography"
            required
          ></textarea>
          <button type="submit" class="generate-btn">Generate Image</button>
        </form>

        <p class="hint">
          팁: 조명, 렌즈 느낌, 시간대(아침/노을), 질감(목재/책장)까지 적으면 더 사실적인 결과를 얻을 수 있어요.
        </p>
      </section>

      <section class="preview" aria-live="polite">
        <div class="preview__overlay"></div>
        <div class="preview__content">
          <p class="preview__label">Generated preview prompt</p>
          <h2 id="preview-title">Warm bookstore & café atmosphere</h2>
          <p id="preview-text">
            amber lighting, handcrafted wooden shelves, steaming coffee cups, candid realism
          </p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
